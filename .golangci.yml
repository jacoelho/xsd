version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - govet
    - staticcheck
    - revive
    - errcheck
    - ineffassign
    - iface
    - dupl
    - dogsled
    - forbidigo
    - funlen
    - gocritic
    - nestif
    - maintidx
    - unparam
    - errorlint
    - makezero
    - modernize
    - noctx
    - recvcheck
    - unconvert

  settings:
    govet:
      enable-all: true

    errcheck:
      check-blank: true

    revive:
      enable-default-rules: true
      rules:
        - name: blank-imports
        - name: bool-literal-in-expr
        - name: constant-logical-expr
        - name: context-as-argument
          arguments:
            - allow-types-before: "*testing.T"
        - name: context-keys-type
        - name: dot-imports
        - name: empty-lines
        - name: error-return
        - name: error-strings
        - name: exported
          arguments:
            - disableStutteringCheck
        - name: identical-branches
        - name: identical-ifelseif-branches
        - name: identical-ifelseif-conditions
        - name: identical-switch-branches
        - name: identical-switch-conditions
        - name: if-return
        - name: increment-decrement
        - name: modifies-value-receiver
        - name: package-comments
        - name: redefines-builtin-id
        - name: superfluous-else
          arguments:
            - preserve-scope
        - name: time-naming
        - name: unchecked-type-assertion
        - name: unexported-return
        - name: unnecessary-if
        - name: var-declaration
        - name: var-naming

    iface:
      enable:
        - identical
        - unused
        - opaque
        - unexported

    dupl:
      threshold: 120

    dogsled:
      max-blank-identifiers: 1

    forbidigo:
      analyze-types: true
      forbid:
        - pattern: ^strings\.TrimSpace$
          pkg: ^strings$
          msg: use trimXMLWhitespace for XML/XSD lexical whitespace
        - pattern: ^bytes\.TrimSpace$
          pkg: ^bytes$
          msg: use trimXMLWhitespaceBytes for XML/XSD lexical whitespace
        - pattern: ^strings\.Fields$
          pkg: ^strings$
          msg: use xmlFieldsSeq for XML/XSD lexical whitespace
        - pattern: ^strings\.FieldsSeq$
          pkg: ^strings$
          msg: use xmlFieldsSeq for XML/XSD lexical whitespace

    gocritic:
      enabled-checks:
        - boolExprSimplify
        - commentedOutImport
        - deferUnlambda
        - dupImport
        - emptyFallthrough
        - emptyStringTest
        - exposedSyncMutex
        - hexLiteral
        - httpNoBody
        - methodExprCall
        - octalLiteral
        - preferFilepathJoin
        - redundantSprint
        - regexpSimplify
        - stringConcatSimplify
        - stringsCompare
        - timeExprSimplify
        - typeAssertChain
        - typeUnparen
        - unlabelStmt
        - unnecessaryBlock
        - whyNoLint
        - yodaStyleExpr

    funlen:
      lines: 120
      statements: 70
      ignore-comments: true

    nestif:
      min-complexity: 15

    maintidx:
      under: 25

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - cyclop
          - gocognit
          - funlen
          - nestif
          - dupl
          - maintidx
      - path: _test\.go
        text: "unused-parameter:"
        linters:
          - revive
      - path: _test\.go
        linters:
          - govet
        text: "fieldalignment"
