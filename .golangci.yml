version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  enable:
    - govet
    - staticcheck
    - revive
    - gocognit
    - cyclop
    - errcheck
    - ineffassign
    - iface
    - dupl
    - funlen
    - nestif
    - maintidx

  settings:
    gocognit:
      min-complexity: 75

    cyclop:
      max-complexity: 30
      package-average: 10.0

    iface:
      enable:
        - identical
        - unused
        - opaque
        - unexported

    dupl:
      threshold: 120

    funlen:
      lines: 120
      statements: 70
      ignore-comments: true

    nestif:
      min-complexity: 15

    maintidx:
      under: 25

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - cyclop
          - gocognit
          - funlen
          - nestif
          - dupl
          - maintidx
      - path: ^(internal/model/(value_compare|wildcard)\.go|internal/semanticcheck/simple_types_restriction\.go)$
        linters:
          - maintidx
      - path: ^internal/model/
        linters:
          - iface
      - path: ^internal/preprocessor/resolve/types\.go$
        linters:
          - iface
      - path: ^(internal/model/(simple_type_core|value_compare|wildcard)\.go|internal/semanticcheck/(facets_inheritance|simple_types_restriction)\.go|pkg/xmltext/decoder\.go)$
        linters:
          - cyclop
      - path: ^internal/semanticresolve/type_derivation_validation\.go$
        linters:
          - gocognit
      - path: ^(cmd/xmllint/main\.go|internal/compiler/schema_constraints\.go|internal/semanticcheck/schema_validator\.go|internal/semantics/compiler_emit\.go|pkg/xmltext/decoder_internal\.go)$
        linters:
          - funlen
      - path: ^(internal/model/(value_compare|wildcard)\.go|internal/semanticcheck/simple_types_restriction\.go|pkg/xmltext/decoder\.go)$
        linters:
          - funlen
      - path: ^internal/semanticresolve/(resolver_simple_types_restriction|validation_facets_inline)\.go$
        linters:
          - nestif
      - text: "exported:|package-comments:|stutters;"
        linters:
          - revive
      - path: _test\.go
        text: "unused-parameter:"
        linters:
          - revive

issues:
  exclude-use-default: false
