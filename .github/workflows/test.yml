on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:
name: test
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: 'actions/checkout@v6'

      - uses: 'actions/setup-go@v6'
        with:
          go-version-file: 'go.mod'

      - uses: 'actions/setup-node@v6'
        with:
          node-version: '24'

      - run: make staticcheck

      - run: make lint

      - run: make test

      - run: make wasm-test

      - run: make web-test

      - run: make fuzz-smoke

      - run: make race

      - run: make bench-smoke
